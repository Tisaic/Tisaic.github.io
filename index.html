  <!-- Self-hosted markdown renderer (marked v12) for the doc viewers. -->

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #6366f1;
      --accent-2: #22c55e;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px 16px 90px;
      line-height: 1.5;
    }
    header { text-align: center; margin: 12px 0 24px; }
    h1 { font-size: 1.5rem; margin: 0 0 4px; }
    header p { color: var(--muted); margin: 0; font-size: 0.9rem; }
    footer { text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 8px; }

    /* ---- doc viewer launchers (stacked above the console button) ---- */
    .doc-launch {
      position: fixed; right: 14px; z-index: 2147483646;
      width: 46px; height: 46px; border-radius: 12px;
      background: #1e293b; color: #cbd5e1; border: 1px solid #334155;
      box-shadow: 0 4px 14px rgba(0,0,0,.4);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1px; cursor: pointer; padding: 0;
    }
    .doc-launch:active { background: #273449; }
    .doc-launch svg { width: 18px; height: 18px; display: block; }
    .doc-launch .lbl { font-size: 8px; letter-spacing: .5px; color: #94a3b8; }
    #doc-all { bottom: 68px; }
    #ngrc-launch { bottom: 122px; text-decoration: none; }
    #ngrc-launch svg { color: #a5b4fc; }

    /* ---- doc viewer overlay ---- */
    #doc-view { position: fixed; inset: 0; z-index: 2147483647; background: #0b1220;
      color: #e2e8f0; display: none; flex-direction: column; }
    #doc-view.open { display: flex; }
    #doc-head { flex: 0 0 auto; display: flex; align-items: center; gap: 8px; padding: 10px 12px;
      background: #111827; border-bottom: 1px solid #1e293b; }
    #doc-head .t { font-weight: 700; font-size: 15px; flex: 1; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; }
    #doc-head .doc-tag { flex: 0 0 auto; font-size: 10px; font-weight: 700; letter-spacing: .5px;
      padding: 3px 7px; border-radius: 6px; background: #334155; color: #cbd5e1;
      text-transform: uppercase; display: none; }
    #doc-head .doc-tag.claude { background: #4f46e5; color: #fff; }
    #doc-bar optgroup { font-weight: 700; }
    #doc-head button { background: #334155; color: #fff; border: none; border-radius: 8px;
      padding: 8px 12px; font-size: 14px; cursor: pointer; width: auto; }
    #doc-bar { flex: 0 0 auto; display: none; gap: 8px; padding: 8px 12px; background: #0f172a;
      border-bottom: 1px solid #1e293b; flex-wrap: wrap; }
    #doc-bar.show { display: flex; }
    #doc-bar select { flex: 1; min-width: 120px; background: #0b1220; color: #e2e8f0;
      border: 1px solid #334155; border-radius: 8px; padding: 10px; font-size: 16px; }
    #doc-body { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 16px 16px 64px; line-height: 1.6; font-size: 15px; }
    #doc-body > *:first-child { margin-top: 0; }
    #doc-body h1, #doc-body h2, #doc-body h3 { line-height: 1.25; margin: 1.2em 0 .5em; }
    #doc-body h1 { font-size: 1.6em; border-bottom: 1px solid #1e293b; padding-bottom: .3em; }
    #doc-body h2 { font-size: 1.3em; border-bottom: 1px solid #1e293b; padding-bottom: .2em; }
    #doc-body h3 { font-size: 1.1em; }
    #doc-body a { color: #818cf8; }
    #doc-body code { background: #1e293b; padding: .15em .4em; border-radius: 5px; font-size: .9em;
      font-family: ui-monospace, Menlo, Consolas, monospace; }
    #doc-body pre { background: #111827; padding: 12px; border-radius: 10px; overflow-x: auto; }
    #doc-body pre code { background: none; padding: 0; }
    #doc-body blockquote { border-left: 3px solid #4f46e5; margin: 1em 0; padding: .2em 1em; color: #94a3b8; }
    #doc-body table { border-collapse: collapse; width: 100%; display: block; overflow-x: auto; }
    #doc-body th, #doc-body td { border: 1px solid #334155; padding: 8px 10px; text-align: left; }
    #doc-body th { background: #1e293b; }
    #doc-body img { max-width: 100%; }
    #doc-body hr { border: none; border-top: 1px solid #1e293b; margin: 1.5em 0; }
    #doc-body ul, #doc-body ol { padding-left: 1.4em; }
    #doc-body .doc-file-sep { color: #64748b; font-size: 12px; margin: 24px 0 8px;
      border-top: 1px dashed #334155; padding-top: 12px; }
    #doc-body .doc-err { color: #fca5a5; }

<body>
  <header>
    <h1>📱 Android Chrome Test Page</h1>
    <p>A sandbox for browser-driven testing workflows</p>
  </header>

  <a class="doc-launch" id="ngrc-launch" href="ngrc.html" aria-label="NGRC playground">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
    <span class="lbl">NGRC</span>
  </a>

  <footer>Tisaic.github.io · built for in-browser test workflows</footer>

  <script>
    console.log('page ready ✓');
  </script>

  <!-- ============================================================= -->
  <!-- DOC VIEWERS: CLAUDE.md button + all-.md Docs button           -->
  <!-- ============================================================= -->
  <script>
  (function () {
    "use strict";
    function el(t, a, h) {
      var n = document.createElement(t);
      if (a) for (var k in a) n.setAttribute(k, a[k]);
      if (h != null) n.innerHTML = h;
      return n;
    }
    function bust(u) { return u + (u.indexOf("?") < 0 ? "?" : "&") + "t=" + (new Date().getTime()); }
    function render(md) {
      if (window.marked && window.marked.parse) {
        try { return window.marked.parse(md); } catch (e) { /* fall through */ }
      }
      var d = document.createElement("div"); d.textContent = md;
      return "<pre>" + d.innerHTML + "</pre>";
    }
    function fetchText(path) {
      return fetch(bust(path), { cache: "no-store" }).then(function (r) {
        if (!r.ok) throw new Error(r.status + " " + path);
        return r.text();
      });
    }
    function fetchManifest() {
      return fetch(bust("docs-manifest.json"), { cache: "no-store" })
        .then(function (r) { return r.ok ? r.json() : { files: [] }; })
        .catch(function () { return { files: [] }; });
    }

    // ---- overlay ----
    var view = el("div", { id: "doc-view" });
    var head = el("div", { id: "doc-head" });
    var tag = el("span", { "class": "doc-tag" });
    var title = el("span", { "class": "t" }); title.textContent = "Docs";
    var close = el("button", {}, "Close ✕");
    head.appendChild(tag); head.appendChild(title); head.appendChild(close);
    function isClaude(f) { return f && f.name && f.name.toLowerCase() === "claude.md"; }

    var bar = el("div", { id: "doc-bar" });
    var dirSel = el("select", { "aria-label": "Directory" });
    var fileSel = el("select", { "aria-label": "File" });
    bar.appendChild(dirSel); bar.appendChild(fileSel);

    var body = el("div", { id: "doc-body" });
    view.appendChild(head); view.appendChild(bar); view.appendChild(body);
    close.addEventListener("click", function () { view.classList.remove("open"); });
    function open() { view.classList.add("open"); }

    // ---- launcher ----
    var stackIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v12"></path><path d="M20 7h-9a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"></path></svg>';
    var bAll = el("button", { id: "doc-all", "class": "doc-launch", "aria-label": "View docs" },
      stackIcon + '<span class="lbl">DOCS</span>');

    // ---- docs view ----
    var manifest = [];
    function showAll() {
      bar.classList.add("show");
      body.innerHTML = '<p style="color:#94a3b8">Loading…</p>';
      open();
      fetchManifest().then(function (m) {
        // sort: CLAUDE files first, then by path
        manifest = (m.files || []).slice().sort(function (a, b) {
          var ca = isClaude(a), cb = isClaude(b);
          if (ca !== cb) return ca ? -1 : 1;
          return a.path < b.path ? -1 : 1;
        });
        var dirs = [], seen = {};
        manifest.forEach(function (f) { if (!seen[f.dir]) { seen[f.dir] = 1; dirs.push(f.dir); } });
        dirs.sort();
        dirSel.innerHTML = "";
        var allOpt = el("option", { value: "*" });
        allOpt.textContent = "All directories (" + manifest.length + ")";
        dirSel.appendChild(allOpt);
        dirs.forEach(function (d) {
          var o = el("option", { value: d }); o.textContent = (d === "." ? "(root)" : d); dirSel.appendChild(o);
        });
        populateFiles("*");
        // default to CLAUDE.md so "our state" is one tap away
        var first = manifest.filter(isClaude)[0] || manifest[0];
        if (first) { loadFile(first.path); }
        else body.innerHTML = '<p class="doc-err">No .md files found.</p>';
      });
    }
    function optFor(f, dir) {
      var o = el("option", { value: f.path });
      o.textContent = (isClaude(f) ? "◆ " : "") + f.name +
        (dir === "*" && f.dir !== "." ? "  (" + f.dir + ")" : "");
      return o;
    }
    function populateFiles(dir) {
      fileSel.innerHTML = "";
      var list = manifest.filter(function (f) { return dir === "*" || f.dir === dir; });
      var claude = list.filter(isClaude);
      var docs = list.filter(function (f) { return !isClaude(f); });
      if (claude.length) {
        var g1 = el("optgroup", { label: "◆ CLAUDE context" });
        claude.forEach(function (f) { g1.appendChild(optFor(f, dir)); });
        fileSel.appendChild(g1);
      }
      if (docs.length) {
        var g2 = el("optgroup", { label: "Docs" });
        docs.forEach(function (f) { g2.appendChild(optFor(f, dir)); });
        fileSel.appendChild(g2);
      }
    }
    function setTag(f) {
      if (isClaude(f)) { tag.textContent = "CLAUDE"; tag.className = "doc-tag claude"; }
      else { tag.textContent = "DOC"; tag.className = "doc-tag"; }
      tag.style.display = "inline-block";
    }
    function loadFile(path) {
      var f = manifest.filter(function (x) { return x.path === path; })[0];
      setTag(f);
      title.textContent = f ? f.name : path;
      body.innerHTML = '<p style="color:#94a3b8">Loading ' + path + "…</p>";
      fetchText(path).then(
        function (t) { body.innerHTML = render(t); body.scrollTop = 0; },
        function () { body.innerHTML = '<p class="doc-err">Could not load ' + path + "</p>"; }
      );
      fileSel.value = path;
    }
    dirSel.addEventListener("change", function () {
      populateFiles(dirSel.value);
      if (fileSel.value) loadFile(fileSel.value);
    });
    fileSel.addEventListener("change", function () { loadFile(fileSel.value); });

    bAll.addEventListener("click", showAll);

    function mount() {
      var root = document.body || document.documentElement;
      root.appendChild(bAll); root.appendChild(view);
    }
    if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", mount);
    else mount();
  })();
  </script>
</body>
